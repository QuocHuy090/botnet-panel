# ============================================
# Cau hinh Nginx cho C2 Botnet Server
# Dat tai: /etc/nginx/sites-available/c2-server
# ============================================

# Upstream cho C2 Go server
upstream c2_backend {
    server 127.0.0.1:8443;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Map cho WebSocket
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP server (redirect to HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;
    
    # Cho phep certbot renew
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;
    
    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/your-domain.com/chain.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Resolver cho OCSP stapling
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    
    # Gioi han kich thuoc request body
    client_max_body_size 50m;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Gioi han ket noi
    limit_conn conn_limit 20;
    
    # Trang bao tri (neu can)
    error_page 502 503 504 /maintenance.html;
    
    # Block truy cap truc tiep bang IP
    if ($host != "your-domain.com") {
        return 444;
    }
    
    # Block cac User-Agent xau
    if ($http_user_agent ~* (scanner|bot|crawl|spider|curl|wget|python)) {
        set $block_ua 1;
    }
    if ($http_user_agent ~* (Mozilla|Chrome|Firefox|Safari|Edge|Opera)) {
        set $block_ua 0;
    }
    if ($block_ua = 1) {
        return 403;
    }
    
    # API endpoints (co rate limit rieng)
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;
        
        proxy_pass https://c2_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        
        # Tang cuong bao mat cho API login
        location /api/login {
            limit_req zone=login_limit burst=3 nodelay;
            limit_req_status 429;
            proxy_pass https://c2_backend;
        }
    }
    
    # WebSocket endpoints
    location /ws {
        proxy_pass https://c2_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
    
    location /ws/admin {
        proxy_pass https://c2_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }
    
    # Web Panel
    location / {
        proxy_pass https://c2_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Block truy cap vao file nhaạy cam
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~* \.(sql|db|sqlite|log|bak|backup|old|save|md|sh|bash|yml|yaml|toml|ini|cfg)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Trang bao tri
    location = /maintenance.html {
        root /var/www/html;
        internal;
    }
}

# Tao file bao tri
# Dat tai: /var/www/html/maintenance.html
# sudo mkdir -p /var/www/html
# sudo tee /var/www/html/maintenance.html > /dev/null << 'EOF'
# <!DOCTYPE html>
# <html><head><title>Maintenance</title></head>
# <body style="background:#111;color:#fff;text-align:center;padding-top:100px;">
# <h1>Server Maintenance</h1><p>Please try again later.</p></body></html>
# EOF